<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncharted Lanka | Premium Travel Guide</title>
    
    <!-- Google Fonts (Inter font එක premium look එකක් දෙනවා) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">UNCHARTED<span>LANKA</span></div>
        <ul class="nav-links">
            <li><a href="#" class="active">Home</a></li>
            <li><a href="#">Map</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1 class="fade-in">Explore the <span>Unseen</span></h1>
            <p class="fade-in">Premium, ad-free guide to Sri Lanka's hidden wonders.</p>
            
            <!-- Search Bar -->
            <div class="search-container fade-in">
                <input type="text" id="searchInput" placeholder="Search for a destination (e.g. Sigiriya)...">
            </div>
        </div>
    </header>

    <!-- Filter Section -->
    <section class="filters">
        <div class="filter-wrapper">
            
            <!-- District Dropdown -->
            <div class="dropdown-container">
                <select id="districtFilter" class="custom-select">
                    <option value="all">All Districts</option>
                    <option value="colombo">Colombo</option>
                    <option value="kandy">Kandy</option>
                    <option value="galle">Galle</option>
                    <option value="matale">Matale</option>
                    <option value="nuwara-eliya">Nuwara Eliya</option>
                    <option value="anuradhapura">Anuradhapura</option>
                    <!-- තව දිස්ත්‍රික්ක පස්සේ එකතු කරමු -->
                </select>
            </div>

            <!-- Category Buttons -->
            <div class="category-scroll">
                <button class="cat-btn active" data-cat="all">All</button>
                <button class="cat-btn" data-cat="waterfalls">Waterfalls</button>
                <button class="cat-btn" data-cat="ancient">Ancient Cities</button>
                <button class="cat-btn" data-cat="beaches">Beaches</button>
                <button class="cat-btn" data-cat="wildlife">Wildlife</button>
                <button class="cat-btn" data-cat="hiking">Hiking</button>
            </div>

        </div>
    </section>

    <!-- Destinations Grid -->
    <main class="container">
        <div class="destinations-grid" id="destinationsContainer">
            <!-- JavaScript මගින් මෙතනට cards ඇතුළත් වේවි -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Uncharted Lanka. Designed for Explorers.</p>
    </footer>

    <!-- JS Link -->
    <script src="script.js"></script>
</body>
</html>
